<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="icon" type="image/png" href="./assets/icons/favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>User Card</title>
  </head>
  <body>
    <div class="card">
      <div class="head-card">
        <i class="fa-solid fa-earth-americas"></i>
        <p>Vilnius, Lithuania</p>
      </div>
      <div class="main-card">
        <div class="card-img">
          <img src="./assets/image/noize-mc.jpg" alt="" />
        </div>
        <div class="card-info">
          <span class="thin">Noize MC</span>
          <p>
            Іван Олександрович Алексєєв — російський репер, рок-музикант,<br />
            співак, композитор.
          </p>
        </div>
        <div class="container-btn">
          <button class="card-btn">Follow</button>
        </div>
      </div>
      <div class="foot-card">
        <div class="card-stat">
          <i class="fa-regular fa-image"></i>
          <div class="small-elem">
            <span class="card-stat-value">635</span>
            <span class="card-stat-label">Posts</span>
          </div>
        </div>
        <div class="card-stat">
          <i class="fa-regular fa-heart"></i>
          <div class="small-elem">
            <span class="card-stat-value">3,472</span>
            <span class="card-stat-label">Favorites</span>
          </div>
        </div>
        <div class="card-stat">
          <i class="fa-regular fa-paper-plane"></i>
          <div class="small-elem">
            <span class="card-stat-value">1,293</span>
            <span class="card-stat-label">Messages</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
